name: Build Dictionary

permissions:
  contents: write

on:
  push:
    branches:
      - '**'     # Only triggers on branch pushes
    paths:
      - 'drafts/**'
      - 'code/**'
      - 'scripts/generate_preview.py'

  tags:
    - 'v*'       # 👈 optional, for future workflows if needed

  release:
    types: [published]
  workflow_dispatch:


jobs:
  preview:
    name: Generate Previews
    if: github.event_name == 'push'  # ✅ Prevents running on release/tags
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyyaml rdflib || true

      - name: Run Preview Script
        run: python scripts/generate_preview.py

      - name: Commit Updated Previews
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add preview/
          git diff --cached --quiet || git commit -m "🔄 Update preview files"
          git push origin HEAD:main

      - name: Upload Preview Artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview
          path: preview/

  release:
    name: Generate Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyyaml rdflib || true

      - name: Run Release Script
        run: python scripts/generate_release.py

      - name: Prepare release package
        run: |
          mkdir dist
          cp -r release/* dist/
          cp -r vocab dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "📦 Release ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}